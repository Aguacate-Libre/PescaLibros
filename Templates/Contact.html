{% extends "NavBar.html" %}

{% block title %}Contact{% endblock %}

{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body id="Cnt_Body">
    <div class="Cont_Con">
        <h1 class="Cont_Ttl">Si tienes problemas o necesitas ayuda, contactanos por este medio.</h1>
        <p class="Cont_Srv">Le contactaremos en la brevedad posible.</p>

        <div class="Form_Contact">
            <form action="/contact" method="post">

                <input type="text" name="subject" placeholder="Asunto" required>

                <select id="problem" name="problem">
                    <option value="" required>Que clase de problema tienes?</option>
                    <option value="Buy">Problema con una compra</option>
                    <option value="Product">Problema con un producto</option>
                    <option value="Other">Otro problema</option>
                </select>

                <textarea name="message" placeholder="Explica tu problema" required></textarea>
                
                <div class="Cont_Btn">
                    <button><a href="/">Enviar</a></button> 
                </div>


            </form>
        </div>
    </div>
</body>
</html>

{% endblock %}
