{% extends "NavBar.html" %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="Cont-Sess">

        <div class="Logo-Sess">
            <img src="">
        </div>

        <p>Inicia Sesion</p>

        <form>

            <div class="form-group">
                <label for="name">Nombre de usuario</label>
                <input type="name"
                id="name"
                name="name"
                required
                autofocus>
            </div>

            <div class="form-group">
                <label for="date">Fecha de nacimiento</label>
                <input type="date"
                id="date"
                name="date"
                required
                autofocus>
            </div>

            <div class="form-group">
                <label for="email">Correro electronico</label>
                <input type="email"
                id="email"
                name="email"
                required
                autofocus>
            </div>

            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password"
                id="password"
                name="password"
                required
                autofocus>
            </div>

            <div class="form-links">
                <a href="/forgot-password">olvide mi contraseña</a>
            </div>

            <div class="form-action">
                <input class="submit" type="submit" value="Ingresar">
            </div>

            <div class="form-links">
                <p>No tienees cuenta? </p>
                <a href="/SignIn">Registrate</a>
            </div>

        </form>
    </div>
</body>
</html>
